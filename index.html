<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Quản lý sản phẩm</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f9f9f9; }
    table { width: 100%; border-collapse: collapse; background: #fff; margin: 15px 0; }
    th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
    th { background: #007bff; color: #fff; cursor: pointer; user-select: none; }
    tbody tr:nth-child(odd) { background: #f8f9fa; }
    tbody tr:hover { background: #e9ecef; }
    .form-group { display: flex; gap: 8px; flex-wrap: wrap; margin: 15px 0; }
    input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; min-width: 120px; }
    button { padding: 8px 16px; background: #28a745; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #218838; }
  </style>
</head>
<body>

<h2>Danh sách sản phẩm</h2>
<table id="product-table">
  <thead>
    <tr>
      <th>STT</th>
      <th id="sort-name">Tên sản phẩm ▲</th>
      <th>Danh mục</th>
      <th>Đơn giá</th>
      <th>Số lượng</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

<h2>Thêm sản phẩm</h2>
<div class="form-group">
  <input id="input-name" placeholder="Tên sản phẩm (≥3 ký tự)">
  <input id="input-category" placeholder="Danh mục">
  <input id="input-price" type="number" placeholder="Đơn giá (>0)">
  <input id="input-quantity" type="number" placeholder="Số lượng (≥1)">
  <button id="btn-add">Thêm</button>
</div>

<script>
  const $ = id => document.getElementById(id);
  let products = [], asc = true;

  function render(list) {
    $('product-table').querySelector('tbody').innerHTML = 
      list.map((p, i) => `<tr><td>${i+1}</td><td>${p.name}</td><td>${p.category||''}</td><td>${p.price.toLocaleString('vi-VN')}</td><td>${p.quantity}</td></tr>`).join('');
  }

  // Load AJAX
  const xhr = new XMLHttpRequest();
  xhr.onload = () => { if(xhr.status===200) { products = JSON.parse(xhr.responseText); render(products); } };
  xhr.open('GET', 'products.json'); xhr.send();

  // Sort by name
  $('sort-name').onclick = () => {
    products.sort((a,b) => asc ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name));
    asc = !asc; $('sort-name').textContent = 'Tên sản phẩm ' + (asc?'▲':'▼'); render(products);
  };

  // Add product
  $('btn-add').onclick = () => {
    const name = $('input-name').value.trim(), cat = $('input-category').value.trim(),
          price = +$('input-price').value, qty = +$('input-quantity').value;
    
    if(name.length < 3) return alert('Tên ≥ 3 ký tự');
    if(price <= 0) return alert('Đơn giá > 0');
    if(!Number.isInteger(qty) || qty < 1) return alert('Số lượng ≥ 1');

    products.push({ id: products.length+1, name, category: cat, price, quantity: qty });
    render(products);
    ['input-name','input-category','input-price','input-quantity'].forEach(id => $(id).value = '');
  };
</script>

</body>
</html>
